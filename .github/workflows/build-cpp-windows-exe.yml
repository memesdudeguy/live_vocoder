# Native C++ vocoder: Windows PE .exe + MinGW DLLs (same folder runs on Windows and under Wine).
# Artifacts (AppVersion 6.0 from installer scripts):
#   - LiveVocoder-full-setup-v6.0 — full portable + Python (LiveVocoder_Setup_6.0.exe)
#   - LiveVocoder-Cpp-setup-v6.0 — SDL-only minimal installers (Windows + Wine host)
#
# Publish a GitHub Release (uploads both .exe): create and push a version tag, e.g.
#   git tag v6.0 && git push origin v6.0
name: Build C++ Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  mingw64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate LiveVocoder.ico from assets (Pillow)
        shell: pwsh
        run: |
          python -m pip install --user -q pillow
          python cpp/installer/gen_livevocoder_ico.py

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-ttf-dejavu
            mingw-w64-x86_64-ffmpeg
            unzip

      - name: Configure & build
        shell: msys2 {0}
        run: |
          cd cpp
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release .
          cmake --build build

      - name: Bundle DLLs for portable folder
        shell: msys2 {0}
        run: bash cpp/bundle-mingw.sh

      - name: Bundle SDL GUI font (DejaVu)
        shell: msys2 {0}
        run: |
          mkdir -p cpp/dist-windows/fonts
          cp -f /mingw64/share/fonts/TTF/DejaVuSans.ttf cpp/dist-windows/fonts/

      - name: Full portable tree (embeddable Python + app) for installer
        shell: msys2 {0}
        run: |
          mkdir -p cpp/dist-windows-cross
          cp -a cpp/dist-windows/. cpp/dist-windows-cross/
          cd cpp && bash bundle-dist-windows-cross-python.sh

      - name: Install Inno Setup and build full installer .exe
        shell: powershell
        run: |
          choco install innosetup -y --no-progress
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after choco install innosetup" }
          & $iscc "$env:GITHUB_WORKSPACE\cpp\installer\LiveVocoder.iss"

      - name: Fetch VB-Cable (official zip) for minimal installer bundle
        shell: pwsh
        run: |
          $zipUrl = "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip"
          $stage = Join-Path $env:RUNNER_TEMP "vb-cable-pack"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $zip = Join-Path $stage "VBCABLE_Driver_Pack45.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $stage -Force
          $setup = Join-Path $stage "VBCABLE_Setup_x64.exe"
          if (-not (Test-Path $setup)) { throw "VBCABLE_Setup_x64.exe missing in VB-Audio zip (layout changed?)" }
          $dest = Join-Path $env:GITHUB_WORKSPACE "cpp/installer/third_party"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Force $setup (Join-Path $dest "VBCABLE_Setup_x64.exe")
          Write-Host "Bundled VB-Cable setup from official package (VB-Audio donationware — see vb-audio.com/Cable/)."

      - name: Minimal SDL installer payload (6.0)
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cp -f /mingw64/bin/ffmpeg.exe "$GITHUB_WORKSPACE/cpp/dist-windows/ffmpeg.exe"
          export LV_MINIMAL_EXE="$GITHUB_WORKSPACE/cpp/dist-windows/LiveVocoder.exe"
          cd "$GITHUB_WORKSPACE/cpp"
          bash bundle-installer-minimal.sh

      - name: Compile minimal Inno installer (Windows + Wine, single .exe)
        shell: powershell
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found for minimal installer" }
          $iss = Join-Path $env:GITHUB_WORKSPACE "cpp\installer\LiveVocoderCppMinimal.iss"
          & $iscc $iss

      - name: Upload portable folder (exe + DLLs + Python for Wine / Windows)
        uses: actions/upload-artifact@v4
        with:
          name: LiveVocoder-windows-v6.0
          path: cpp/dist-windows-cross/

      - name: Upload full Inno Setup installer (6.0)
        uses: actions/upload-artifact@v4
        with:
          name: LiveVocoder-full-setup-v6.0
          path: cpp/dist-installer/LiveVocoder_Setup_*.exe

      - name: Upload minimal C++ installers (6.0)
        uses: actions/upload-artifact@v4
        with:
          name: LiveVocoder-Cpp-setup-v6.0
          path: cpp/dist-installer/LiveVocoder-Setup.exe

  release:
    name: Publish GitHub Release (tag builds only)
    needs: mingw64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download full installer artifact
        uses: actions/download-artifact@v4
        with:
          name: LiveVocoder-full-setup-v6.0
          path: release-assets

      - name: Download minimal C++ installer artifact
        uses: actions/download-artifact@v4
        with:
          name: LiveVocoder-Cpp-setup-v6.0
          path: release-assets

      - name: Attach app icon for shortcuts / manual use
        run: cp -f cpp/installer/LiveVocoder.ico release-assets/LiveVocoder-6.0.ico

      - name: Create GitHub Release with installers
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Live Vocoder ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/LiveVocoder_Setup_*.exe
            release-assets/LiveVocoder-Setup.exe
            release-assets/LiveVocoder-6.0.ico
