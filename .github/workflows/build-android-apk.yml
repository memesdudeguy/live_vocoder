# Debug APK aligned with desktop release line (versionName 7.0 in app/build.gradle.kts).
name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/build-android-apk.yml'

permissions:
  contents: read

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveVocoder-android-v7.0-debug
          path: android/app/build/outputs/apk/debug/*.apk
